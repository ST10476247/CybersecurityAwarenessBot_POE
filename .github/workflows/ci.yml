name: Build CI
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_NOLOGO: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 1

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore NuGet Packages
        run: dotnet restore CyberBot.csproj --verbosity minimal

      - name: Build
        run: dotnet build CyberBot.csproj --configuration Release --no-restore

      - name: Verify Output
        shell: pwsh
        run: |
          $buildDir = "bin/Release/net8.0-windows"
          if (Test-Path $buildDir) {
            Write-Host "Build directory contents:"
            Get-ChildItem $buildDir | Select-Object Name, Length
            if (Test-Path (Join-Path $buildDir "CyberBot.exe") -or Test-Path (Join-Path $buildDir "CyberBot.dll")) {
              Write-Host "✅ Build verified successfully!"
              exit 0
            }
          }
          Write-Error "❌ Build failed - no artifacts found!"
          exit 1
