name: Build and Test (CI)
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Clear NuGet cache
        run: dotnet nuget locals all --clear

      - name: Restore NuGet packages
        run: dotnet restore CyberBot.csproj

      - name: Build Release
        run: dotnet build CyberBot.csproj --configuration Release --no-restore

      - name: Publish Application
        run: dotnet publish CyberBot.csproj --configuration Release --self-contained false --output ./publish

      - name: Check Publish Output
        shell: pwsh
        run: |
          $publishDir = "./publish"
          if (Test-Path $publishDir) {
            Write-Host "Contents of publish directory:"
            Get-ChildItem $publishDir -Recurse | Select-Object -ExpandProperty FullName
            if (Test-Path (Join-Path $publishDir "CyberBot.exe")) {
              Write-Host "✅ CyberBot.exe found!"
            } elseif (Test-Path (Join-Path $publishDir "CyberBot.dll")) {
              Write-Host "✅ CyberBot.dll found!"
            } else {
              Write-Error "❌ No executable or DLL found!"
              exit 1
            }
          } else {
            Write-Error "❌ Publish directory not found!"
            exit 1
          }
